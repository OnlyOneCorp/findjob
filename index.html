<style>
  :root{
    --ink:#1d1d1f;
    --muted:#6e6e73;
    --hairline:rgba(0,0,0,.10);
    --surface:#ffffff;
    --bg:#f5f5f7;
    --brand:#3f4550;       /* 로고 차콜 */
    --accent:#0a84ff;      /* 선택/강조 */
    --accent-soft:rgba(10,132,255,.10);
    --radius:18px;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 12px 30px rgba(0,0,0,.06);
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"SF Pro Text","Apple SD Gothic Neo",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:var(--bg);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  a{color:inherit}
  button{font-family:inherit;cursor:pointer;border:none;background:none}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:50;
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    background:rgba(245,245,247,.8);
    border-bottom:1px solid var(--hairline);
  }
  .bar{
    max-width:720px;margin:0 auto;padding:11px 18px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:9px;text-decoration:none}
  .brand svg{display:block}
  .brand b{font-size:17px;font-weight:600;letter-spacing:-.01em;color:var(--brand)}
  .actions{display:flex;align-items:center;gap:8px}
  .pill{
    font-size:13px;font-weight:500;color:var(--muted);
    padding:7px 13px;border-radius:980px;border:1px solid var(--hairline);
    background:var(--surface);transition:.18s ease;white-space:nowrap;text-decoration:none;
  }
  .pill:hover{color:var(--ink);border-color:rgba(0,0,0,.22)}
  .lang{display:flex;border:1px solid var(--hairline);border-radius:980px;overflow:hidden;background:var(--surface)}
  .lang button{font-size:12px;font-weight:600;color:var(--muted);padding:7px 11px}
  .lang button.on{background:var(--brand);color:#fff}

  /* ---------- Layout ---------- */
  main{max-width:720px;margin:0 auto;padding:28px 18px 60px}
  .screen{display:none;animation:rise .45s cubic-bezier(.2,.7,.2,1)}
  .screen.on{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* ---------- Intro ---------- */
  .hero{text-align:center;padding:30px 6px 10px}
  .mark{margin:0 auto 22px;width:84px;height:84px}
  h1{font-size:34px;line-height:1.12;font-weight:700;letter-spacing:-.02em;margin:0 0 12px}
  .lede{font-size:17px;color:var(--muted);margin:0 auto;max-width:430px}
  .steps{display:flex;justify-content:center;gap:7px;margin:26px 0 30px;flex-wrap:wrap}
  .steps span{font-size:12.5px;color:var(--muted);background:var(--surface);border:1px solid var(--hairline);padding:6px 12px;border-radius:980px}
  .cta{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--brand);color:#fff;font-size:17px;font-weight:600;
    padding:14px 30px;border-radius:980px;transition:.18s ease;box-shadow:var(--shadow);
  }
  .cta:hover{transform:translateY(-1px);filter:brightness(1.06)}
  .cta:active{transform:translateY(0)}
  .cta.secondary{background:var(--surface);color:var(--ink);border:1px solid var(--hairline);box-shadow:none}

  /* ---------- Quiz ---------- */
  .qhead{margin-bottom:18px}
  .progress{display:flex;gap:6px;margin-bottom:18px}
  .progress i{height:4px;flex:1;border-radius:4px;background:var(--hairline);transition:.3s}
  .progress i.done{background:var(--brand)}
  .progress i.now{background:var(--accent)}
  .round-no{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.02em}
  .qtitle{font-size:25px;font-weight:700;letter-spacing:-.02em;margin:6px 0 4px}
  .qsub{font-size:14.5px;color:var(--muted);margin:0}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:22px 0 26px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
  .chip{
    position:relative;text-align:left;background:var(--surface);
    border:1.5px solid var(--hairline);border-radius:var(--radius);
    padding:16px 15px;font-size:15px;font-weight:500;color:var(--ink);
    transition:transform .12s ease, border-color .15s, background .15s;
    min-height:64px;display:flex;align-items:center;
  }
  .chip:active{transform:scale(.97)}
  .chip .em{font-size:20px;margin-right:10px;flex:none}
  .chip.sel{border-color:var(--accent);background:var(--accent-soft)}
  .chip.sel:after{
    content:"✓";position:absolute;top:9px;right:11px;
    width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;
    font-size:12px;font-weight:700;display:grid;place-items:center;
  }
  .navrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .count{font-size:13.5px;color:var(--muted)}
  .count b{color:var(--ink)}

  /* ---------- Analyzing ---------- */
  .analyze{text-align:center;padding:70px 0}
  .scan{width:96px;height:96px;margin:0 auto 26px;animation:scan 1.4s ease-in-out infinite}
  @keyframes scan{0%{transform:translate(-10px,-6px) rotate(-8deg)}50%{transform:translate(10px,6px) rotate(8deg)}100%{transform:translate(-10px,-6px) rotate(-8deg)}}
  .analyze p{font-size:16px;color:var(--muted)}

  /* ---------- Results ---------- */
  .rhead{text-align:center;margin-bottom:8px}
  .rhead h2{font-size:27px;font-weight:700;letter-spacing:-.02em;margin:0 0 6px}
  .rhead p{font-size:15px;color:var(--muted);margin:0}
  .reslist{margin:24px 0 8px;display:flex;flex-direction:column;gap:12px}
  .res{
    background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);
    padding:16px 17px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);
    animation:resin .5s forwards;
  }
  @keyframes resin{to{opacity:1;transform:none}}
  .res .top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .res .rank{font-size:13px;font-weight:700;color:var(--muted);width:26px;flex:none}
  .res .name{font-size:17px;font-weight:600;flex:1}
  .res .pct{font-size:18px;font-weight:700;color:var(--brand);font-variant-numeric:tabular-nums}
  .res.gold .pct{color:var(--accent)}
  .track{height:7px;border-radius:7px;background:var(--hairline);margin:11px 0 0;overflow:hidden}
  .track i{display:block;height:100%;border-radius:7px;background:var(--brand);width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
  .res.gold .track i{background:linear-gradient(90deg,var(--accent),#5fb0ff)}
  .books{display:flex;align-items:center;gap:8px;margin-top:13px;flex-wrap:wrap}
  .books .bk{font-size:13px;color:var(--muted);margin-right:2px}
  .books .bk b{color:var(--ink);font-weight:600}
  .shop{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:980px;border:1px solid var(--hairline);background:var(--surface);transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  .shop:hover{border-color:rgba(0,0,0,.25)}
  .shop.amz{color:#b45309}
  .shop.cou{color:#c2410c}

  .resfoot{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:26px}

  /* ---------- Footer ---------- */
  footer{max-width:720px;margin:0 auto;padding:30px 18px 46px;text-align:center;border-top:1px solid var(--hairline)}
  footer p{font-size:13px;color:var(--muted);margin:5px 0}
  footer a{color:var(--brand);text-decoration:none;font-weight:500}

  /* ---------- Consent ---------- */
  .consent{
    position:fixed;left:0;right:0;bottom:0;z-index:100;
    padding:16px;display:none;
    animation:up .4s cubic-bezier(.2,.8,.2,1);
  }
  .consent.show{display:block}
  @keyframes up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  .consent .card{
    max-width:640px;margin:0 auto;background:rgba(255,255,255,.9);
    backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
    border:1px solid var(--hairline);border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.18);
    padding:18px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .consent p{font-size:13.5px;color:var(--muted);margin:0;flex:1;min-width:230px;line-height:1.45}
  .consent p a{color:var(--accent);text-decoration:none}
  .consent .btns{display:flex;gap:8px}
  .consent .btns button{font-size:14px;font-weight:600;padding:10px 18px;border-radius:980px;transition:.15s}
  .consent .ok{background:var(--brand);color:#fff}
  .consent .ok:hover{filter:brightness(1.08)}
  .consent .no{background:var(--surface);color:var(--ink);border:1px solid var(--hairline)}

  .toast{
    position:fixed;
    background:rgba(29,29,31,.92);color:#fff;font-size:14px;font-weight:500;
    padding:11px 18px;border-radius:980px;opacity:0;pointer-events:none;
    transition:.3s;z-index:120;transform:translateX(-50%) translateY(20px);left:50%;bottom:28px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>

}
function updateCount(){
  const n=selected[round].size;
  $('#count').innerHTML = n>0 ? I18N[lang].countTpl(n) : `<span style="color:var(--muted)">${I18N[lang].pickHint}</span>`;

/* =================== Scoring =================== */
function userVector(){
  const v={};
  ROUNDS.forEach((R,ri)=> selected[ri].forEach(idx=>{
    const t=R.items[idx].t; for(const k in t) v[k]=(v[k]||0)+t[k];
  }));
  return v;
}
function cosine(a,b){
  let dot=0,na=0,nb=0; const keys=new Set([...Object.keys(a),...Object.keys(b)]);
  keys.forEach(k=>{const x=a[k]||0,y=b[k]||0;dot+=x*y;});
  for(const k in a) na+=a[k]*a[k]; for(const k in b) nb+=b[k]*b[k];
  return (na&&nb)? dot/(Math.sqrt(na)*Math.sqrt(nb)) : 0;
}
function computeTop(){
  const uv=userVector();
  let scored=JOBS.map(j=>({job:j,cos:cosine(uv,j.t)}));
  scored.sort((a,b)=>b.cos-a.cos);
  const max=scored[0].cos||1;
  return scored.slice(0,10).map((s,i)=>({...s, pct: Math.max(2, Math.round(s.cos/max*96+3)) , rank:i+1}));
}

/* =================== Share via hash =================== */
function writeHash(){
  try{
    const payload = selected.map(s=>[...s]);
    location.hash = 'r='+btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  }catch(e){}
}
function loadHash(){
  const m=location.hash.match(/r=([^&]+)/);
  if(!m) return false;
  try{
    const payload=JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    if(!Array.isArray(payload)||payload.length!==ROUNDS.length) return false;
    selected=payload.map(a=>new Set(a));
    lastTop=computeTop();
    show('result'); renderResults();
    return true;
  }catch(e){ return false; }
}

/* =================== Save image =================== */
function drawMark(ctx,cx,cy,s,color){
  ctx.strokeStyle=color; ctx.lineWidth=s*0.13; ctx.beginPath();
  ctx.arc(cx,cy,s*0.28,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle=color; const rw=s*0.15, rh=s*0.42, rx=cx-rw/2, ry=cy+s*0.34;
  roundRect(ctx,rx,ry,rw,rh,rw/2); ctx.fill();
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function buildCard(){
  const cv=$('#cv'), ctx=cv.getContext('2d'), W=1080,H=1350;
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f5f5f7'; roundRect(ctx,40,40,W-80,H-80,44); ctx.fill();
  drawMark(ctx,W/2,150,150,'#3f4550');
  ctx.textAlign='center'; ctx.fillStyle='#1d1d1f';
  ctx.font='700 52px Pretendard, sans-serif';
  ctx.fillText(lang==='ko'?'나와 어울리는 직업':'Careers that fit me', W/2, 300);
  ctx.font='400 26px Pretendard, sans-serif'; ctx.fillStyle='#6e6e73';
  ctx.fillText('OnlyOne · Career Finder', W/2, 344);
  const top=lastTop.slice(0,5); let y=430; const mx=120, bw=W-mx*2;
  top.forEach((r,i)=>{
    ctx.textAlign='left'; ctx.fillStyle= i===0?'#0a84ff':'#1d1d1f';
    ctx.font='600 38px Pretendard, sans-serif';
    ctx.fillText(`${r.rank}. ${r.job[lang]}`, mx, y);
    ctx.textAlign='right'; ctx.font='700 38px Pretendard, sans-serif';
    ctx.fillStyle= i===0?'#0a84ff':'#3f4550';
    ctx.fillText(r.pct+'%', mx+bw, y);
    ctx.fillStyle='#e3e3e6'; roundRect(ctx,mx,y+18,bw,16,8); ctx.fill();
    ctx.fillStyle= i===0?'#0a84ff':'#3f4550'; roundRect(ctx,mx,y+18,bw*r.pct/100,16,8); ctx.fill();
    y+=130;
  });
  ctx.textAlign='center'; ctx.fillStyle='#6e6e73'; ctx.font='400 26px Pretendard, sans-serif';
  ctx.fillText('main.onlyonecorpceo.workers.dev', W/2, H-90);
  ctx.fillStyle='#aeaeb2'; ctx.font='400 22px Pretendard, sans-serif';
  ctx.fillText('OnlyOne · For a Happy Day', W/2, H-56);
  return cv;
}

  $('#brandLink').href=ONLYONE.LANDING; $('#brandLink').target='_blank'; $('#brandLink').rel='noopener';

  $('#brandLink').addEventListener('click',()=>track('onlyone_click',{from:'brand'}));
  $('#homePill').addEventListener('click',()=>track('onlyone_click',{from:'pill'}));
  $('#mail').href='mailto:'+ONLYONE.CONTACT; $('#mail').textContent=ONLYONE.CONTACT;
  $('#year').textContent=new Date().getFullYear();
}

/* =================== GA4 + Consent Mode v2 =================== */
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('consent','default',{ad_storage:'denied',ad_user_data:'denied',ad_personalization:'denied',analytics_storage:'denied',wait_for_update:500});
gtag('js',new Date());
function loadGA(){
  if(window.__gaLoaded || !ONLYONE.GA_ID || ONLYONE.GA_ID.indexOf('XXXX')>-1) return;
  window.__gaLoaded=true;
  const s=document.createElement('script'); s.async=true;
  s.src='https://www.googletagmanager.com/gtag/js?id='+ONLYONE.GA_ID;
  document.head.appendChild(s);
  gtag('config',ONLYONE.GA_ID,{anonymize_ip:true});
}
function track(name,params){ try{ gtag('event',name,params||{}); }catch(e){} }

const CONSENT_KEY='oo_consent';
function applyConsent(state){
  if(state==='granted'){
    gtag('consent','update',{ad_storage:'granted',ad_user_data:'granted',ad_personalization:'granted',analytics_storage:'granted'});
    loadGA();
  }
}
function initConsent(){
  const saved=localStorage.getItem(CONSENT_KEY);
  if(saved==='granted'){ applyConsent('granted'); }
  else if(saved==='denied'){ /* keep denied */ }
  else { $('#consent').classList.add('show'); }
  $('#cOk').onclick=()=>{ localStorage.setItem(CONSENT_KEY,'granted'); $('#consent').classList.remove('show'); applyConsent('granted'); track('consent',{choice:'granted'}); };
  $('#cNo').onclick=()=>{ localStorage.setItem(CONSENT_KEY,'denied'); $('#consent').classList.remove('show'); };
}

/* =================== Init =================== */
wireLinks();
applyI18n();
initConsent();
if(!loadHash()){ show('intro'); }
// privacy link inside consent (delegated, re-bound on lang change)
document.addEventListener('click',e=>{ if(e.target && e.target.id==='ppLink'){ e.preventDefault(); toast(lang==='ko'?'방문 통계 외 개인정보를 수집하지 않습니다.':'We only collect anonymous visit stats.'); } });
</script>
